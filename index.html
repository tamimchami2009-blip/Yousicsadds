<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOUsics</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4841079120157860" crossorigin="anonymous"></script>
<meta name="google-site-verification" content="NOzDh4RLz5NCNUVn96DAClxmZYg4ijvMAm_WhzhgYF4" />

<style>
  :root {
    --bg: #07040d;
    --bg2: #0e0818;
    --card: #150d24;
    --card2: #1c1130;
    --sidebar: #0a0614;
    --accent: #bf5fff;
    --accent2: #7c3aed;
    --accent3: #4a1d8a;
    --text: #f0e8ff;
    --text2: #9b7dc8;
    --text3: #4d3878;
    --danger: #ff3b5c;
    --glow: 0 0 20px rgba(191,95,255,0.25);
    --glow2: 0 0 40px rgba(191,95,255,0.12);
    --radius: 14px;
    --radius2: 20px;
    --player-h: 90px;
    --sidebar-w: 260px;
    --font: 'Exo 2', sans-serif;
    --mono: 'Space Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--accent3); border-radius: 2px; }

  /* ===== STARS BG ===== */
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star { position: absolute; border-radius: 50%; background: #fff; opacity: 0; animation: twinkle var(--d, 3s) var(--delay, 0s) infinite; }
  @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--op,0.4)} }

  /* ===== LOGIN ===== */
  #login-screen {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, #0e0520 0%, #040208 100%);
  }
  .login-box {
    width: 380px; padding: 50px 40px;
    background: rgba(12,6,28,0.95);
    border: 1px solid rgba(191,95,255,0.2);
    border-radius: var(--radius2);
    box-shadow: 0 0 60px rgba(191,95,255,0.08), 0 0 120px rgba(124,58,237,0.06), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: loginIn 0.6s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes loginIn { from{opacity:0;transform:translateY(24px) scale(0.97)} to{opacity:1;transform:none} }
  .login-logo {
    text-align: center; margin-bottom: 36px;
  }
  .login-logo h1 {
    font-size: 42px; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, #bf5fff, #7c3aed, #d896ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(191,95,255,0.5));
  }
  .login-logo p { color: var(--text2); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; font-family: var(--mono); }
  .login-field { margin-bottom: 16px; }
  .login-field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text2); margin-bottom: 8px; font-family: var(--mono); }
  .login-field input {
    width: 100%; padding: 14px 18px;
    background: rgba(191,95,255,0.04); border: 1px solid rgba(191,95,255,0.15);
    border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 15px;
    outline: none; transition: all 0.2s;
  }
  .login-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(191,95,255,0.1); background: rgba(191,95,255,0.07); }
  .login-btn {
    width: 100%; margin-top: 24px; padding: 15px;
    background: linear-gradient(135deg, #7c3aed, #bf5fff);
    border: none; border-radius: 10px; color: #fff; font-family: var(--font); font-size: 15px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(191,95,255,0.3);
  }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(191,95,255,0.45); }
  .login-btn:active { transform: translateY(0); }
  .login-msg { text-align: center; margin-top: 14px; font-size: 13px; min-height: 20px; transition: all 0.3s; }
  .login-msg.error { color: var(--danger); }
  .login-msg.success { color: #00ff88; }
  .login-divider { display:flex; align-items:center; gap:12px; margin:18px 0 0; color:var(--text3); font-size:12px; }
  .login-divider::before,.login-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }
  .guest-btn { width:100%; margin-top:10px; padding:13px; background:transparent; border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:var(--text2); font-family:var(--font); font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; letter-spacing:0.5px; }
  .guest-btn:hover { border-color:rgba(255,255,255,0.2); color:var(--text); background:rgba(255,255,255,0.04); }

  /* MOBILE BOTTOM NAV */
  #mobile-nav { display:none; position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(8,4,18,0.97); backdrop-filter:blur(16px); border-top:1px solid rgba(191,95,255,0.12); padding:8px 0 12px; justify-content:space-around; align-items:center; }
  .mob-nav-btn { background:none; border:none; color:var(--text3); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:20px; padding:4px 12px; border-radius:10px; transition:all 0.2s; }
  .mob-nav-btn span { font-size:10px; font-family:var(--mono); letter-spacing:1px; }
  .mob-nav-btn.active { color:var(--accent); }
  #sidebar-overlay { display:none; position:fixed; inset:0; z-index:149; background:rgba(0,0,0,0.5); backdrop-filter:blur(2px); }

  /* RESPONSIVE */
  @media (max-width:768px) {
    :root { --player-h:76px; }
    .app-body { padding:8px 8px 0; gap:0; }
    #sidebar { position:fixed; left:-280px; top:0; bottom:0; z-index:150; border-radius:0 var(--radius2) var(--radius2) 0; transition:left 0.3s cubic-bezier(0.16,1,0.3,1); padding-bottom:80px; }
    #sidebar.open { left:0; }
    #sidebar-overlay.show { display:block; }
    #content { border-radius:var(--radius); padding:16px 12px 80px; }
    .content-header h2 { font-size:20px; }
    #player-bar { padding:0 8px 74px; }
    .player-inner { width:100%; height:62px; padding:0 12px; gap:10px; border-radius:14px; }
    .player-info { width:100px; }
    .player-title { font-size:12px; }
    .player-sub { display:none; }
    .expand-btn { display:none; }
    .song-card { padding:10px 12px; gap:10px; }
    .song-art { width:44px; height:44px; }
    .song-name { font-size:14px; }
    .fs-art { width:200px; height:200px; }
    .fs-title { font-size:20px; }
    .fs-inner { width:90vw; }
    .login-box { width:92vw; padding:36px 24px; }
    .login-logo h1 { font-size:34px; }
    #mobile-nav { display:flex; }
    .sidebar-ad { display:none; }
    #upload-progress { left:12px; right:12px; bottom:130px; }
  }
  @media (max-width:400px) {
    .login-box { padding:28px 16px; }
    .player-inner { gap:6px; padding:0 8px; }
    .player-info { width:80px; }
    .song-art { width:38px; height:38px; font-size:16px; }
  }

  /* ===== APP LAYOUT ===== */
  #app { display: none; position: fixed; inset: 0; z-index: 1; }
  #app.visible { display: flex; flex-direction: column; }

  .app-body {
    display: flex; flex: 1; overflow: hidden;
    padding: 12px 12px 0 12px; gap: 10px;
  }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--sidebar);
    border-radius: var(--radius2);
    border: 1px solid rgba(191,95,255,0.08);
    box-shadow: var(--glow2);
    display: flex; flex-direction: column;
    overflow: hidden; padding: 20px 0;
  }
  .sidebar-logo {
    padding: 0 20px 20px;
    font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffd700, #c8960c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    border-bottom: 1px solid rgba(191,95,255,0.08);
    margin-bottom: 16px;
  }
  .sidebar-section { padding: 0 12px; margin-bottom: 8px; }
  .sidebar-btn {
    width: 100%; padding: 11px 14px; display: flex; align-items: center; gap: 10px;
    background: transparent; border: none; border-radius: 10px;
    color: var(--text2); font-family: var(--font); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .sidebar-btn:hover, .sidebar-btn.active { background: rgba(191,95,255,0.08); color: var(--text); }
  .sidebar-btn.active { color: var(--accent); box-shadow: inset 2px 0 0 var(--accent); }
  .sidebar-btn .icon { font-size: 16px; }

  .upload-area {
    margin: 4px 12px;
    padding: 14px;
    border: 1.5px dashed rgba(191,95,255,0.2);
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .upload-area:hover { border-color: var(--accent); background: rgba(191,95,255,0.05); }
  .upload-area p { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .upload-area .upload-icon { font-size: 22px; margin-bottom: 6px; }
  #file-input { display: none; }

  .section-label {
    padding: 0 20px; margin: 16px 0 6px;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text3); font-family: var(--mono);
  }

  .playlist-list { flex: 1; overflow-y: auto; padding: 0 12px; }
  .playlist-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px; border-radius: 9px; cursor: pointer;
    transition: all 0.2s; margin-bottom: 2px;
  }
  .playlist-item:hover { background: rgba(191,95,255,0.07); }
  .playlist-item.active { background: rgba(191,95,255,0.1); color: var(--accent); }
  .playlist-item span { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .playlist-item .pl-del {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 14px; padding: 2px 5px; border-radius: 5px; transition: all 0.15s;
    line-height: 1;
  }
  .playlist-item .pl-del:hover { color: var(--danger); background: rgba(255,59,92,0.1); }

  .add-playlist-btn {
    margin: 8px 12px 0;
    width: calc(100% - 24px); padding: 9px;
    background: rgba(191,95,255,0.06); border: 1px solid rgba(191,95,255,0.15);
    border-radius: 9px; color: var(--accent); font-family: var(--font); font-size: 13px;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-playlist-btn:hover { background: rgba(191,95,255,0.12); }

  .sidebar-ad {
    margin: 10px 12px 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(191,95,255,0.08);
    background: rgba(0,0,0,0.2);
    min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .sidebar-ad ins { display: block; width: 100%; }
  .sidebar-logout {
    margin: 10px 12px 0; padding: 9px 14px;
    background: none; border: 1px solid rgba(255,59,92,0.2);
    border-radius: 9px; color: var(--danger); font-family: var(--font); font-size: 12px;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .sidebar-logout:hover { background: rgba(255,59,92,0.08); }

  /* ===== CONTENT ===== */
  #content {
    flex: 1; border-radius: var(--radius2);
    background: var(--bg2);
    border: 1px solid rgba(191,95,255,0.06);
    overflow-y: auto; padding: 28px 24px;
    display: flex; flex-direction: column;
  }
  .content-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .content-header h2 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
  .content-header .song-count { font-size: 13px; color: var(--text2); font-family: var(--mono); }

  .songs-grid { display: flex; flex-direction: column; gap: 8px; max-width: 680px; margin: 0 auto; width: 100%; }

  .song-card {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-radius: var(--radius);
    background: var(--card); border: 1px solid rgba(191,95,255,0.07);
    cursor: pointer; transition: all 0.2s; position: relative; overflow: visible;
  }
  .song-card:hover { background: var(--card2); border-color: rgba(191,95,255,0.2); transform: scale(1.008); box-shadow: var(--glow); }
  .song-card.playing { background: var(--card2); border-color: rgba(191,95,255,0.35); box-shadow: var(--glow); }

  .song-art {
    width: 52px; height: 52px; border-radius: 10px; flex-shrink: 0;
    object-fit: cover; background: var(--card2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; overflow: hidden;
  }
  .song-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .song-art.no-img { background: linear-gradient(135deg, #0c2040, #0a1530); }

  .song-info { flex: 1; min-width: 0; }
  .song-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-card.playing .song-name { color: var(--accent); }
  .song-meta { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: var(--mono); }

  .playing-indicator {
    display: none; gap: 2px; align-items: flex-end; height: 18px; margin-right: 4px;
  }
  .song-card.playing .playing-indicator { display: flex; }
  .bar { width: 3px; background: #ffd700; border-radius: 2px; animation: eq var(--s, 0.8s) ease-in-out infinite alternate; }
  .bar:nth-child(1) { height: 8px; --s: 0.6s; }
  .bar:nth-child(2) { height: 14px; --s: 0.4s; animation-delay: 0.1s; }
  .bar:nth-child(3) { height: 10px; --s: 0.7s; animation-delay: 0.2s; }
  @keyframes eq { from{transform:scaleY(0.4)} to{transform:scaleY(1)} }

  .song-menu-btn {
    background: none; border: none; color: var(--text2); font-size: 18px;
    cursor: pointer; padding: 6px 8px; border-radius: 6px; transition: all 0.15s;
    line-height: 1;
  }
  .song-menu-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  /* EMPTY STATE */
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text3); text-align: center; padding: 40px;
  }
  .empty-state .big-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ===== CONTEXT MENU ===== */
  #ctx-menu {
    position: fixed; z-index: 900;
    background: #0a1625; border: 1px solid rgba(191,95,255,0.25);
    border-radius: 12px; padding: 6px;
    min-width: 190px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 20px rgba(191,95,255,0.1);
    display: none; animation: menuIn 0.15s cubic-bezier(0.16,1,0.3,1);
  }
  #ctx-menu.open { display: block; }
  @keyframes menuIn { from{opacity:0;transform:scale(0.92) translateY(-4px)} to{opacity:1;transform:none} }
  .ctx-item {
    padding: 9px 14px; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 500; transition: all 0.15s;
    display: flex; align-items: center; gap: 10px; color: var(--text);
  }
  .ctx-item:hover { background: rgba(191,95,255,0.1); color: var(--accent); }
  .ctx-item.danger:hover { background: rgba(255,59,92,0.1); color: var(--danger); }
  .ctx-item .ci { font-size: 15px; }
  .ctx-divider { height: 1px; background: rgba(191,95,255,0.08); margin: 4px 0; }

  /* Submenu for playlist */
  .ctx-submenu { padding: 6px; min-width: 160px; }
  .ctx-submenu-item { padding: 8px 12px; border-radius: 7px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .ctx-submenu-item:hover { background: rgba(191,95,255,0.1); color: var(--accent); }

  /* ===== PLAYER BAR ===== */
  #player-bar {
    height: var(--player-h); padding: 0 16px 12px;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .player-inner {
    width: 85%; max-width: 860px; height: 72px;
    background: rgba(8,18,36,0.92); backdrop-filter: blur(20px);
    border: 1px solid rgba(191,95,255,0.18); border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), var(--glow2);
    display: flex; align-items: center; gap: 16px; padding: 0 20px;
    transition: all 0.3s;
  }
  .player-inner.active { border-color: rgba(191,95,255,0.3); box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 30px rgba(191,95,255,0.2); }

  .player-art {
    width: 46px; height: 46px; border-radius: 10px; flex-shrink: 0;
    background: var(--card2); display: flex; align-items: center; justify-content: center;
    font-size: 20px; overflow: hidden; cursor: pointer;
  }
  .player-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

  .player-info { flex-shrink: 0; width: 160px; min-width: 0; }
  .player-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--accent); }
  .player-sub { font-size: 11px; color: var(--text2); font-family: var(--mono); }

  .player-progress { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .progress-bar-wrap {
    height: 4px; background: rgba(255,255,255,0.07); border-radius: 3px; cursor: pointer; position: relative;
    transition: height 0.15s;
  }
  .progress-bar-wrap:hover { height: 6px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #c8960c, #ffd700); border-radius: 3px; transition: width 0.1s linear; position: relative; }
  .progress-fill::after { content:''; position:absolute; right:-4px; top:50%; transform:translateY(-50%); width:10px; height:10px; border-radius:50%; background:#fff; box-shadow:0 0 6px #ffd700; opacity:0; transition:opacity 0.15s; }
  .progress-bar-wrap:hover .progress-fill::after { opacity:1; }
  .progress-times { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); font-family: var(--mono); }

  .player-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ctrl-btn {
    background: none; border: none; color: var(--text2); cursor: pointer;
    padding: 7px; border-radius: 50%; font-size: 18px; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .ctrl-btn.play-btn {
    background: linear-gradient(135deg, #7c3aed, #bf5fff); color: #fff;
    width: 42px; height: 42px; font-size: 20px;
    box-shadow: 0 0 16px rgba(255,215,0,0.35);
  }
  .ctrl-btn.play-btn:hover { transform: scale(1.08); box-shadow: 0 0 24px rgba(255,215,0,0.5); }

  .expand-btn {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 16px; padding: 6px; border-radius: 8px; transition: all 0.15s; flex-shrink: 0;
  }
  .expand-btn:hover { color: var(--accent); }

  /* ===== FULLSCREEN PLAYER ===== */
  #fullscreen-player {
    position: fixed; inset: 0; z-index: 800;
    background: radial-gradient(ellipse at 50% 30%, #1a1200 0%, #050400 100%);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.35s;
  }
  #fullscreen-player.open { opacity: 1; pointer-events: all; }
  .fs-inner {
    text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px;
    transform: translateY(20px); transition: transform 0.35s;
    width: 380px; max-width: 90vw;
  }
  #fullscreen-player.open .fs-inner { transform: none; }
  .fs-art {
    width: 260px; height: 260px; border-radius: 22px; overflow: hidden;
    box-shadow: 0 0 60px rgba(255,215,0,0.2), 0 20px 60px rgba(0,0,0,0.6);
    background: var(--card2); display: flex; align-items: center; justify-content: center;
    font-size: 80px;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .fs-art img { width: 100%; height: 100%; object-fit: cover; }
  .fs-title { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; max-width: 340px; }
  .fs-sub { font-size: 13px; color: var(--accent); font-family: var(--mono); }
  .fs-progress { width: 100%; }
  .fs-controls { display: flex; align-items: center; gap: 14px; }
  .fs-ctrl {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 24px; padding: 10px; border-radius: 50%; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

<script>
// ========== STARS ==========
(function(){
  const c = document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className='star';
    const sz=Math.random()*2+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*4+2}s;--delay:${Math.random()*5}s;--op:${Math.random()*0.4+0.1}`;
    c.appendChild(s);
  }
})();

// ========== DB ==========
const DB = (function(){
  let db;
  const NAME='yousics_db', VER=1, STORE='songs';
  function open(){
    return new Promise((res,rej)=>{
      if(db){return res(db);}
      const req=indexedDB.open(NAME,VER);
      req.onupgradeneeded=e=>{ e.target.result.createObjectStore(STORE,{keyPath:'id'}); };
      req.onsuccess=e=>{ db=e.target.result; res(db); };
      req.onerror=e=>rej(e.target.error);
    });
  }
  function tx(mode){ return open().then(d=>d.transaction(STORE,mode).objectStore(STORE)); }
  return {
    add(song){ return tx('readwrite').then(s=>new Promise((r,j)=>{const q=s.put(song);q.onsuccess=()=>r();q.onerror=j;})); },
    getAll(){ return tx('readonly').then(s=>new Promise((r,j)=>{const q=s.getAll();q.onsuccess=()=>r(q.result);q.onerror=j;})); },
    get(id){ return tx('readonly').then(s=>new Promise((r,j)=>{const q=s.get(id);q.onsuccess=()=>r(q.result);q.onerror=j;})); },
    update(song){ return tx('readwrite').then(s=>new Promise((r,j)=>{const q=s.put(song);q.onsuccess=()=>r();q.onerror=j;})); },
    delete(id){ return tx('readwrite').then(s=>new Promise((r,j)=>{const q=s.delete(id);q.onsuccess=()=>r();q.onerror=j;})); }
  };
})();

// ========== AUTH ==========
const Auth = (function(){
  function getUsers(){ try{return JSON.parse(localStorage.getItem('yousics_users')||'{}')}catch{return{}} }
  function saveUsers(u){ localStorage.setItem('yousics_users',JSON.stringify(u)); }
  function getCurrent(){ return localStorage.getItem('yousics_current'); }
  function setCurrent(u){ localStorage.setItem('yousics_current',u); }
  function clearCurrent(){ localStorage.removeItem('yousics_current'); }
  return {
    getCurrent, clearCurrent,
    login(user,pass){
      const users=getUsers();
      if(!users[user]){
        users[user]={pass,playlists:[],meta:{}};
        saveUsers(users); setCurrent(user);
        return {ok:true,created:true};
      }
      if(users[user].pass!==pass) return {ok:false,err:'Incorrect password'};
      setCurrent(user); return {ok:true,created:false};
    },
    logout(){ clearCurrent(); }
  };
})();

// ========== PLAYLISTS (localStorage) ==========
const PL = (function(){
  function key(user){ return `yousics_pl_${user}`; }
  function get(user){ try{return JSON.parse(localStorage.getItem(key(user))||'[]')}catch{return[]} }
  function save(user,pls){ localStorage.setItem(key(user),JSON.stringify(pls)); }
  return {
    getAll(user){ return get(user); },
    create(user,name){
      const pls=get(user);
      pls.push({id:Date.now().toString(),name,songs:[]});
      save(user,pls);
    },
    delete(user,plId){
      save(user,get(user).filter(p=>p.id!==plId));
    },
    addSong(user,plId,songId){
      const pls=get(user);
      const pl=pls.find(p=>p.id===plId);
      if(pl&&!pl.songs.includes(songId)){pl.songs.push(songId); save(user,pls); return true;}
      return false;
    },
    removeSong(user,plId,songId){
      const pls=get(user);
      const pl=pls.find(p=>p.id===plId);
      if(pl){pl.songs=pl.songs.filter(s=>s!==songId); save(user,pls);}
    }
  };
})();

// ========== PLAYER ==========
const Player = (function(){
  const audio = document.getElementById('audio-el');
  let queue=[], idx=0, blobURLs={};
  function fmt(s){ if(isNaN(s))return'0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return`${m}:${sec.toString().padStart(2,'0')}`; }
  function setArt(el,song){
    if(song&&song.image){ el.innerHTML=`<img src="${song.image}" alt="">`; }
    else { el.innerHTML='🎵'; }
  }
  function updateUI(song){
    const playing=!audio.paused;
    document.getElementById('player-title').textContent=song?song.name:'No track playing';
    document.getElementById('player-sub').textContent='YOUsics';
    setArt(document.getElementById('player-art'),song);
    document.getElementById('fs-title').textContent=song?song.name:'No track';
    document.getElementById('fs-sub').textContent='YOUsics';
    setArt(document.getElementById('fs-art'),song);
    document.getElementById('play-btn').textContent=playing?'⏸':'▶';
    document.getElementById('fs-play').textContent=playing?'⏸':'▶';
    document.getElementById('player-inner').classList.toggle('active',!!song);
    document.querySelectorAll('.song-card').forEach(c=>{
      const active=song&&c.dataset.id===song.id;
      c.classList.toggle('playing',active);
    });
  }
  function getOrCreateURL(song){
    if(blobURLs[song.id]) return blobURLs[song.id];
    if(song.audioBlob){
      const url=URL.createObjectURL(song.audioBlob);
      blobURLs[song.id]=url; return url;
    }
    return null;
  }
  async function play(songId){
    const song=await DB.get(songId);
    if(!song){toast('Song not found');return;}
    const url=getOrCreateURL(song);
    if(!url){toast('Audio data missing');return;}
    audio.src=url; audio.play();
    updateUI(song);
  }
  audio.addEventListener('timeupdate',()=>{
    if(!audio.duration) return;
    const pct=(audio.currentTime/audio.duration)*100;
    document.getElementById('progress-fill').style.width=pct+'%';
    document.getElementById('fs-progress-fill').style.width=pct+'%';
    document.getElementById('time-cur').textContent=fmt(audio.currentTime);
    document.getElementById('fs-time-cur').textContent=fmt(audio.currentTime);
  });
  audio.addEventListener('loadedmetadata',()=>{
    document.getElementById('time-total').textContent=fmt(audio.duration);
    document.getElementById('fs-time-total').textContent=fmt(audio.duration);
  });
  audio.addEventListener('ended',()=>{ next(); });
  audio.addEventListener('play',()=>{ document.getElementById('play-btn').textContent='⏸'; document.getElementById('fs-play').textContent='⏸'; });
  audio.addEventListener('pause',()=>{ document.getElementById('play-btn').textContent='▶'; document.getElementById('fs-play').textContent='▶'; });
  function seek(e,el){
    const r=el.getBoundingClientRect();
    const pct=(e.clientX-r.left)/r.width;
    audio.currentTime=pct*audio.duration;
  }
  function prev(){
    if(!queue.length)return;
    idx=(idx-1+queue.length)%queue.length;
    play(queue[idx]);
  }
  function next(){
    if(!queue.length)return;
    idx=(idx+1)%queue.length;
    play(queue[idx]);
  }
  function toggle(){ audio.paused?audio.play():audio.pause(); }
  return {
    play(id,q){ if(q){queue=q;idx=q.indexOf(id);if(idx<0)idx=0;} play(id); },
    prev, next, toggle, seek,
    setQueue(q){ queue=q; },
    getCurrentId(){ return queue[idx]||null; }
  };
})();

// ========== UTILS ==========
function toast(msg, dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function modal(title, placeholder=''){
  return new Promise(res=>{
    const ov=document.getElementById('modal-overlay');
    document.getElementById('modal-title').textContent=title;
    const inp=document.getElementById('modal-input');
    inp.placeholder=placeholder; inp.value=''; 
    ov.classList.add('open');
    setTimeout(()=>inp.focus(),50);
    const ok=document.getElementById('modal-ok');
    const cancel=document.getElementById('modal-cancel');
    function cleanup(val){ ov.classList.remove('open'); ok.replaceWith(ok.cloneNode(true)); cancel.replaceWith(cancel.cloneNode(true)); res(val); }
    document.getElementById('modal-ok').onclick=()=>cleanup(inp.value.trim()||null);
    document.getElementById('modal-cancel').onclick=()=>cleanup(null);
    inp.onkeydown=e=>{ if(e.key==='Enter')cleanup(inp.value.trim()||null); if(e.key==='Escape')cleanup(null); };
  });
}

function fileToBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

// ========== RENDER ==========
let currentUser=null, currentView='all', currentPlId=null;
let allSongs=[];

function renderSongs(songs){
  const grid=document.getElementById('songs-grid');
  grid.innerHTML='';
  document.getElementById('song-count').textContent=songs.length+' track'+(songs.length!==1?'s':'');
  if(!songs.length){
    grid.innerHTML=`<div class="empty-state"><div class="big-icon">🎵</div><h3>No tracks yet</h3><p>Upload some music using the sidebar to get started.</p></div>`;
    return;
  }
  const queue=songs.map(s=>s.id);
  songs.forEach(song=>{
    const card=document.createElement('div');
    card.className='song-card'; card.dataset.id=song.id;
    if(Player.getCurrentId()===song.id) card.classList.add('playing');
    const artHtml=song.image?`<div class="song-art"><img src="${song.image}" alt=""></div>`:`<div class="song-art no-img">🎵</div>`;
    card.innerHTML=`
      ${artHtml}
      <div class="song-info">
        <div class="song-name">${escHtml(song.name)}</div>
        <div class="song-meta">${song.createdAt?new Date(song.createdAt).toLocaleDateString():'Audio track'}</div>
      </div>
      <div class="playing-indicator"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      <button class="song-menu-btn" data-id="${song.id}" title="Options">⋮</button>
    `;
    card.addEventListener('click',e=>{
      if(e.target.classList.contains('song-menu-btn')) return;
      Player.play(song.id, queue);
    });
    card.querySelector('.song-menu-btn').addEventListener('click',e=>{
      e.stopPropagation();
      openCtxMenu(e, song.id);
    });
    grid.appendChild(card);
  });
}

function escHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function loadView(){
  allSongs=await DB.getAll();
  allSongs.sort((a,b)=>b.createdAt-a.createdAt);
  if(currentView==='all'){
    document.getElementById('content-title').textContent='All Songs';
    renderSongs(allSongs);
  } else {
    const pls=PL.getAll(currentUser);
    const pl=pls.find(p=>p.id===currentPlId);
    if(!pl){ currentView='all'; loadView(); return; }
    document.getElementById('content-title').textContent='📁 '+pl.name;
    const plSongs=pl.songs.map(id=>allSongs.find(s=>s.id===id)).filter(Boolean);
    renderSongs(plSongs);
  }
}

function renderPlaylists(){
  const pls=PL.getAll(currentUser);
  const list=document.getElementById('playlist-list');
  list.innerHTML='';
  pls.forEach(pl=>{
    const item=document.createElement('div');
    item.className='playlist-item'+(currentPlId===pl.id&&currentView!=='all'?' active':'');
    item.dataset.id=pl.id;
    item.innerHTML=`<span>📁 ${escHtml(pl.name)}</span><button class="pl-del" data-id="${pl.id}" title="Delete">×</button>`;
    item.addEventListener('click',e=>{
      if(e.target.classList.contains('pl-del')) return;
      currentView='playlist'; currentPlId=pl.id;
      document.querySelectorAll('.sidebar-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.playlist-item').forEach(i=>i.classList.remove('active'));
      item.classList.add('active');
      loadView(); renderPlaylists();
    });
    item.querySelector('.pl-del').addEventListener('click',e=>{
      e.stopPropagation();
      PL.delete(currentUser,pl.id);
      if(currentPlId===pl.id){ currentView='all'; currentPlId=null; loadView(); }
      renderPlaylists();
    });
    list.appendChild(item);
  });
}

// ========== CONTEXT MENU ==========
let ctxSongId=null;
const ctxMenu=document.getElementById('ctx-menu');
const plSubmenu=document.getElementById('pl-submenu');

function openCtxMenu(e, songId){
  ctxSongId=songId;
  closeCtxMenu(); closePlSubmenu();
  const x=Math.min(e.clientX, window.innerWidth-200);
  const y=Math.min(e.clientY, window.innerHeight-200);
  ctxMenu.style.left=x+'px'; ctxMenu.style.top=y+'px';
  ctxMenu.classList.add('open');
}
function closeCtxMenu(){ ctxMenu.classList.remove('open'); closePlSubmenu(); }
function closePlSubmenu(){ plSubmenu.style.display='none'; }

document.getElementById('ctx-rename').onclick=async()=>{
  closeCtxMenu();
  const song=await DB.get(ctxSongId); if(!song) return;
  const name=await modal('Rename track', song.name);
  if(!name) return;
  song.name=name; await DB.update(song); loadView(); toast('Track renamed');
};

document.getElementById('ctx-img').onclick=()=>{
  closeCtxMenu();
  document.getElementById('img-input').click();
};

document.getElementById('img-input').onchange=async(e)=>{
  const file=e.target.files[0]; if(!file) return;
  const b64=await fileToBase64(file);
  const song=await DB.get(ctxSongId); if(!song) return;
  song.image=b64; await DB.update(song); loadView(); toast('Image updated');
  e.target.value='';
};

document.getElementById('ctx-playlist').onclick=(e)=>{
  e.stopPropagation();
  const pls=PL.getAll(currentUser);
  const list=document.getElementById('pl-submenu-list');
  list.innerHTML='';
  if(!pls.length){
    list.innerHTML='<div class="no-playlist-msg">No playlists yet</div>';
  } else {
    pls.forEach(pl=>{
      const d=document.createElement('div');
      d.className='ctx-submenu-item';
      d.textContent=pl.name;
      d.onclick=()=>{
        PL.addSong(currentUser,pl.id,ctxSongId);
        closePlSubmenu(); closeCtxMenu(); toast(`Added to ${pl.name}`);
      };
      list.appendChild(d);
    });
  }
  const rect=ctxMenu.getBoundingClientRect();
  plSubmenu.style.left=(rect.right+4)+'px';
  plSubmenu.style.top=rect.top+'px';
  plSubmenu.style.display='block';
};

document.getElementById('ctx-delete').onclick=async()=>{
  closeCtxMenu();
  const song=await DB.get(ctxSongId); if(!song) return;
  if(!confirm(`Delete "${song.name}"?`)) return;
  await DB.delete(ctxSongId);
  // remove from playlists
  PL.getAll(currentUser).forEach(pl=>PL.removeSong(currentUser,pl.id,ctxSongId));
  loadView(); renderPlaylists(); toast('Track deleted');
};

document.addEventListener('click', e=>{
  if(!ctxMenu.contains(e.target)&&!e.target.classList.contains('song-menu-btn')) closeCtxMenu();
});

// ========== UPLOAD ==========
document.getElementById('file-input').onchange=async(e)=>{
  const files=[...e.target.files]; if(!files.length) return;
  const prog=document.getElementById('upload-progress');
  prog.style.display='block';
  for(let i=0;i<files.length;i++){
    const f=files[i];
    document.getElementById('up-status').textContent=`${i+1}/${files.length}: ${f.name.substring(0,30)}`;
    document.getElementById('up-bar').style.width=((i/files.length)*100)+'%';
    const blob=f; // keep as blob
    const name=f.name.replace(/\.[^.]+$/,'');
    await DB.add({id:Date.now().toString()+Math.random().toString(36).slice(2), name, audioBlob:blob, image:null, createdAt:Date.now()});
  }
  document.getElementById('up-bar').style.width='100%';
  setTimeout(()=>{ prog.style.display='none'; },800);
  e.target.value='';
  loadView();
  toast(`${files.length} track${files.length>1?'s':''} uploaded`);
};

// ========== PLAYER CONTROLS ==========
document.getElementById('play-btn').onclick=()=>Player.toggle();
document.getElementById('prev-btn').onclick=()=>Player.prev();
document.getElementById('next-btn').onclick=()=>Player.next();
document.getElementById('fs-play').onclick=()=>Player.toggle();
document.getElementById('fs-prev').onclick=()=>Player.prev();
document.getElementById('fs-next').onclick=()=>Player.next();

document.getElementById('progress-wrap').onclick=e=>Player.seek(e, document.getElementById('progress-wrap'));
document.getElementById('fs-progress-wrap').onclick=e=>Player.seek(e, document.getElementById('fs-progress-wrap'));

// Fullscreen
const fsPlayer=document.getElementById('fullscreen-player');
document.getElementById('expand-btn').onclick=()=>{ fsPlayer.classList.add('open'); };
document.getElementById('player-art').onclick=()=>{ fsPlayer.classList.add('open'); };
document.getElementById('fs-close').onclick=()=>{ fsPlayer.classList.remove('open'); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape') fsPlayer.classList.remove('open'); });

// Sidebar
document.getElementById('all-songs-btn').onclick=()=>{
  currentView='all'; currentPlId=null;
  document.querySelectorAll('.sidebar-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('all-songs-btn').classList.add('active');
  document.querySelectorAll('.playlist-item').forEach(i=>i.classList.remove('active'));
  loadView(); renderPlaylists();
};

document.getElementById('add-playlist-btn').onclick=async()=>{
  const name=await modal('New Playlist', 'Playlist name…');
  if(!name) return;
  PL.create(currentUser,name); renderPlaylists(); toast(`Playlist "${name}" created`);
};

document.getElementById('logout-btn').onclick=()=>{
  Auth.logout();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
  currentUser=null; currentView='all'; currentPlId=null;
};

// ========== LOGIN ==========
function startApp(user){
  currentUser=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  loadView(); renderPlaylists();
}

document.getElementById('login-btn').onclick=()=>{
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value;
  const msg=document.getElementById('login-msg');
  if(!user||!pass){ msg.className='login-msg error'; msg.textContent='Please fill in all fields.'; return; }
  const res=Auth.login(user,pass);
  if(!res.ok){ msg.className='login-msg error'; msg.textContent=res.err; return; }
  msg.className='login-msg success'; msg.textContent=res.created?'Welcome to YOUsics! 🎵':'Welcome back! 🎵';
  setTimeout(()=>startApp(user),600);
};

document.getElementById('login-pass').onkeydown=e=>{ if(e.key==='Enter') document.getElementById('login-btn').click(); };
document.getElementById('login-user').onkeydown=e=>{ if(e.key==='Enter') document.getElementById('login-pass').focus(); };

// ========== GUEST ==========
document.getElementById('guest-btn').onclick=()=>{
  const msg=document.getElementById('login-msg');
  msg.className='login-msg success'; msg.textContent='Listening as Guest 🎵';
  setTimeout(()=>startApp('__guest__'),600);
};

// ========== MOBILE NAV ==========
function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }
document.getElementById('sidebar-overlay').onclick=()=>closeSidebar();
document.getElementById('mob-menu').onclick=()=>{ openSidebar(); };
document.getElementById('mob-home').onclick=()=>{
  closeSidebar();
  document.getElementById('all-songs-btn').click();
  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mob-home').classList.add('active');
};
document.getElementById('mob-upload-btn').onclick=()=>{ document.getElementById('file-input').click(); };
document.getElementById('mob-fullscreen').onclick=()=>{ document.getElementById('fullscreen-player').classList.add('open'); };

function applyTheme(name){
  const t=THEMES[name]; if(!t) return;
  const r=document.documentElement.style;
  Object.entries(t).forEach(([k,v])=>r.setProperty(k,v));
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active',d.dataset.theme===name));
  localStorage.setItem('yousics_theme',name);
}
document.querySelectorAll('.theme-dot').forEach(d=>{
  d.onclick=()=>{ applyTheme(d.dataset.theme); };
});
(function(){ const t=localStorage.getItem('yousics_theme')||'blue'; applyTheme(t); })();

document.getElementById('mob-playlists').onclick=()=>{
  openSidebar();
  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mob-playlists').classList.add('active');
};

  if(cur){ startApp(cur); }
})();
